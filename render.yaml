# Render.com Blueprint – deploy with "New > Blueprint" and point to this repo
services:
  - type: web
    name: 7go-server
    runtime: python
    rootDir: server
    buildCommand: echo "No build needed"
    startCommand: python3 server.py
    envVars:
      - key: SIGNAL_PORT
        value: "8787"
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
