name: 7Go

options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: M878XBQ25U
  configs:
    Debug:
      SERVER_URL: "https://sevengo.onrender.com"
    Release:
      SERVER_URL: "https://sevengo.onrender.com"

targets:
  7Go:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ios/Sources
        excludes:
          - Info.plist
      - path: ios/Assets.xcassets
      - path: ios/PrivacyInfo.xcprivacy
    dependencies:
      - target: 7GoWatch
        embed: true
        link: false
      - sdk: UserNotifications.framework
    info:
      path: ios/Sources/Info.plist
      properties:
        CFBundleDisplayName: 7Go
        CFBundleShortVersionString: "1.2.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        SERVER_URL: $(SERVER_URL)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macminim4pro.sevengo
        PRODUCT_NAME: 7Go
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SERVER_URL: "$(SERVER_URL)"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ios/7GoDebug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: ios/7Go.entitlements
    postCompileScripts:
      - script: |
          if [ "${CONFIGURATION}" = "Release" ]; then
            if [ -z "${SERVER_URL}" ]; then
              echo "error: SERVER_URL must not be empty for Release."
              exit 1
            fi
            case "${SERVER_URL}" in
              https://*) ;;
              *)
                echo "error: Release SERVER_URL must use HTTPS."
                exit 1
                ;;
            esac
          fi
        name: Validate SERVER_URL
        basedOnDependencyAnalysis: false

  7GoWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: watch/Sources
        excludes:
          - Info.plist
      - path: watch/Assets.xcassets
      - path: watch/PrivacyInfo.xcprivacy
    dependencies:
      - sdk: UserNotifications.framework
      - sdk: WatchConnectivity.framework
    info:
      path: watch/Sources/Info.plist
      properties:
        CFBundleDisplayName: 7Go
        CFBundleShortVersionString: "1.2.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.macminim4pro.sevengo
        SERVER_URL: $(SERVER_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macminim4pro.sevengo.watchkitapp
        PRODUCT_NAME: 7GoWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SERVER_URL: "$(SERVER_URL)"
        CODE_SIGN_ENTITLEMENTS: watch/7GoWatch.entitlements

schemes:
  7Go:
    build:
      targets:
        7Go: all
    run:
      config: Debug
      environmentVariables:
        - variable: SERVER_URL
          value: "https://sevengo.onrender.com"
          isEnabled: true
    archive:
      config: Release

  7GoWatch:
    build:
      targets:
        7GoWatch: all
    run:
      config: Debug
    archive:
      config: Release
